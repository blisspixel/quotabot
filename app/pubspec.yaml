name: quotabot
description: "Glanceable AI quota tracker desktop widget."
publish_to: 'none'
version: 0.5.10+11

environment:
  sdk: ^3.12.2
  flutter: ">=3.38.1"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.2
  quotabot_collector:
    path: ../collector
  flutter_local_notifications: ^22.0.1
  timezone: ^0.11.1
  tray_manager: ^0.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/tray_icon.ico
    - assets/tray_icon.png
