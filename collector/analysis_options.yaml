# Static analysis for the collector package. The code-quality bar
# (docs/dev/CODE-QUALITY-STANDARDS.md) requires a strict analyzer with zero
# warnings or infos; this file makes that machine-enforced rather than a
# convention, and CI runs `dart analyze` against it.

include: package:lints/recommended.yaml

analyzer:
  # Refuse implicit and loose casts so a JSON boundary or a refactor cannot
  # silently reintroduce an unchecked `dynamic` cast. strict-inference and
  # strict-raw-types keep untyped JSON and collection boundaries explicit.
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    # Load-bearing extras beyond the recommended set, for a security- and
    # correctness-sensitive package. Deliberately excludes stylistic/noisy rules
    # (prefer_final_locals, avoid_dynamic_calls) that would flag routine JSON
    # navigation in tests without catching real defects.
    - directives_ordering
    - unawaited_futures
    - throw_in_finally
    - only_throw_errors
