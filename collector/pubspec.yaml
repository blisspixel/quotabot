name: quotabot_collector
description: Collects AI subscription quota/usage across providers into one normalized JSON feed.
version: 0.5.1
environment:
  sdk: ^3.6.0

dependencies:
  http: ^1.2.0
  # Pinned to the 2.x line: sqlite3 3.x changes the FFI open-override API used by
  # the hardened cross-platform loader (sqlite_loader.dart) and needs retesting
  # on Windows, macOS, and Linux before adopting.
  sqlite3: ^2.9.0
  mcp_dart: ^2.2.1
  crypto: ^3.0.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.0
