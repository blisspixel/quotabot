name: Secret scan

# Server-side secret scan on every push and PR, complementing the local
# gitleaks run in the dev loop, GitHub's native secret scanning, and CodeQL.
# Reuses the repository .gitleaks.toml (which allowlists the two public,
# non-confidential Google installed-app OAuth client secrets). gitleaks is
# pinned by version and verified against its published checksum. Actions are
# pinned to commit SHAs (version in the trailing comment); Dependabot's
# github-actions group keeps them current.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history, so detect scans every commit

      - name: Install gitleaks (pinned, checksum-verified)
        run: |
          version=8.30.1
          sha=551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${version}/gitleaks_${version}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${sha}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan the repository history
        run: gitleaks detect --config .gitleaks.toml --redact --no-banner
