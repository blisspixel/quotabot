name: Dependency advisory intake

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: ['dependabot/**']

# This privileged second stage reads only GitHub event and API metadata. It
# checks out trusted main, never the pull request head, and executes no bot code.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: dependency-advisory-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

jobs:
  archive:
    if: >-
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.actor.login == 'dependabot[bot]' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out trusted policy code
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: main
          persist-credentials: false

      - name: Archive warning and remove bot branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: python tools/archive_dependabot_advisory.py
