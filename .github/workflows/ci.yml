name: CI

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Actions are pinned to commit SHAs with versions in trailing comments.
# Dependabot reports available updates; selected pins are recreated and tested
# on a first-party branch.
permissions:
  contents: read

jobs:
  static-quality:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Ruff lint
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          version: '0.15.16'
          args: 'check --output-format=github'
          src: '.'
      - name: Ruff format
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          version: '0.15.16'
          args: 'format --check'
          src: '.'
      - name: actionlint
        shell: bash
        run: |
          archive="$RUNNER_TEMP/actionlint_1.7.7_linux_amd64.tar.gz"
          curl --fail --silent --show-error --location \
            --proto '=https' --tlsv1.2 \
            'https://github.com/rhysd/actionlint/releases/download/v1.7.7/actionlint_1.7.7_linux_amd64.tar.gz' \
            --output "$archive"
          echo '023070a287cd8cccd71515fedc843f1985bf96c436b7effaecce67290e7e0757  '"$archive" \
            | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          "$RUNNER_TEMP/actionlint" -color

  test:
    if: github.actor != 'dependabot[bot]'
    # Run the full suite on every claimed platform (Linux, macOS, Windows) so the
    # cross-platform paths (config dirs, sqlite loader, file sources) are
    # exercised on real hosts, not just assumed. fail-fast off so one OS failing
    # still reports the others.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    # Use bash on every runner (Git Bash on Windows) so the multi-line coverage
    # step's line continuations and paths behave the same everywhere.
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      # Pin Python so `python` resolves on every runner (macOS ships only
      # python3), for the coverage gate and the LiteLLM router tests.
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            integrations/litellm/requirements.in
            integrations/litellm/requirements.txt

      - name: Set up pinned Flutter SDK
        shell: pwsh
        run: >
          ./tools/setup-flutter-ci.ps1
          -FlutterVersion '3.44.6'
          -ExpectedCommit 'ee80f08bbf97172ec030b8751ceab557177a34a6'

      - name: Windows architecture helper tests
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./tools/test-windows-architecture.ps1

      - name: Linux desktop entry tests
        if: runner.os == 'Linux'
        run: bash tools/test-write-desktop-entry.sh

      - name: Coverage checker and policy tests
        run: python -m unittest tools.test_archive_dependabot_advisory tools.test_check_lcov tools.test_check_release_version tools.test_dependency_policy tools.test_desktop_readiness_smoke tools.test_desktop_release_policy tools.test_installer_security tools.test_verify_cli_archive tools.test_verify_desktop_archive

      - name: Release version consistency
        run: python tools/check_release_version.py

      - name: Collector dependencies
        working-directory: collector
        run: dart pub get --enforce-lockfile

      - name: Collector format
        working-directory: collector
        run: dart format --set-exit-if-changed .

      - name: Collector analyze
        working-directory: collector
        run: dart analyze

      - name: Collector tests with coverage
        working-directory: collector
        run: |
          dart test --coverage=coverage
          dart run coverage:format_coverage \
            --lcov \
            --check-ignore \
            --in=coverage \
            --out=coverage/lcov.info \
            --packages=.dart_tool/package_config.json \
            --report-on=lib
          python ../tools/check_lcov.py coverage/lcov.info 90

      - name: Verify Windows CLI package build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tools/package-cli.ps1
          python tools/verify_cli_archive.py release/quotabot-windows-x64.zip

      - name: Verify macOS or Linux CLI package build
        if: runner.os != 'Windows'
        run: |
          bash tools/package-cli.sh
          archive="$(find release -maxdepth 1 -type f \( \
            -name 'quotabot-darwin-*.tar.gz' -o \
            -name 'quotabot-linux-*.tar.gz' \) -print -quit)"
          test -n "$archive"
          python tools/verify_cli_archive.py "$archive"

      - name: Flutter dependencies
        working-directory: app
        run: flutter pub get --enforce-lockfile

      - name: Flutter format
        working-directory: app
        run: dart format --set-exit-if-changed lib test

      - name: Flutter analyze
        working-directory: app
        run: flutter analyze --no-pub

      - name: Flutter tests with coverage
        working-directory: app
        run: |
          flutter test --no-pub --coverage
          python ../tools/check_lcov.py coverage/lcov.info 80

      - name: Verify Windows desktop package build
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          ./tools/package-windows.ps1
          python tools/verify_desktop_archive.py release/quotabot-windows-x64-desktop.zip

      - name: Verify Windows desktop window and tray readiness
        if: runner.os == 'Windows'
        run: python tools/desktop_readiness_smoke.py --executable app/build/windows/x64/runner/Release/quotabot.exe

      - name: Linux desktop build prerequisites
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libayatana-appindicator3-dev dbus-x11 xvfb

      - name: Verify Linux desktop package build
        if: runner.os == 'Linux'
        run: |
          bash tools/package-linux.sh
          python tools/verify_desktop_archive.py release/quotabot-linux-x64-desktop.tar.gz

      - name: Verify Linux desktop window and tray readiness
        if: runner.os == 'Linux'
        run: python tools/desktop_readiness_smoke.py --executable app/build/linux/x64/release/bundle/quotabot

      - name: Verify macOS desktop package build
        if: runner.os == 'macOS'
        run: |
          bash tools/package-macos.sh
          archive="$(find release -maxdepth 1 -name 'quotabot-darwin-*-desktop.zip' -print -quit)"
          test -n "$archive"
          python tools/verify_desktop_archive.py "$archive"

      - name: MCP client snippet tests
        working-directory: integrations/mcp_clients
        run: |
          npm ci
          npm run typecheck
          python -m unittest test_mcp_client_snippets.py

      - name: LiteLLM router tests
        working-directory: integrations/litellm
        env:
          QUOTABOT_RUN_LITELLM_PROXY_TEST: '1'
        run: |
          python -m pip install --require-hashes -r requirements.txt
          python -m unittest test_quotabot_router.py test_quotabot_proxy_integration.py
