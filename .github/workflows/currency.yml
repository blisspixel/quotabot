name: Currency

# Keeps drift and provider catalog checks alive outside normal code changes.
# Provider secrets are optional; missing secrets are reported as skipped.
on:
  workflow_dispatch:
  schedule:
    - cron: "23 10 * * *"

permissions:
  contents: read

concurrency:
  group: currency-${{ github.ref }}
  cancel-in-progress: false

jobs:
  audit:
    name: Drift and catalog currency
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - name: Set up pinned Flutter SDK
        shell: pwsh
        run: >
          ./tools/setup-flutter-ci.ps1
          -FlutterVersion '3.44.6'
          -ExpectedCommit 'ee80f08bbf97172ec030b8751ceab557177a34a6'

      - name: Collector dependencies
        working-directory: collector
        run: dart pub get --enforce-lockfile

      - name: Drift and catalog tests
        working-directory: collector
        run: >
          dart test
          test/drift_test.dart
          test/catalog_audit_test.dart
          test/no_surprise_cost_contract_test.dart

      - name: Provider catalog audit
        working-directory: collector
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: dart run bin/catalog_audit.dart --summary --fail-on-drift --fail-on-error
