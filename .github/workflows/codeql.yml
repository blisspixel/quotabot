name: CodeQL

on:
  workflow_call:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "37 16 * * 2"

# Actions are pinned to commit SHAs with versions in trailing comments.
# Dependabot reports available updates; selected pins are recreated and tested
# on a first-party branch.
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-python:
    if: github.actor != 'dependabot[bot]'
    name: Analyze Python
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          languages: python
          queries: security-extended,security-and-quality
          config: |
            paths:
              - integrations/litellm
              - tools

      - uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          category: "/language:python"

  analyze-typescript:
    if: github.actor != 'dependabot[bot]'
    name: Analyze TypeScript
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: github/codeql-action/init@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality
          config: |
            paths:
              - integrations/mcp_clients

      - uses: github/codeql-action/analyze@e0647621c2984b5ed2f768cb892365bf2a616ad1 # v4
        with:
          category: "/language:javascript-typescript"
