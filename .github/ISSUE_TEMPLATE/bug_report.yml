name: Bug report
description: Something is wrong or a provider reads incorrectly
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For security issues, do not file here; see SECURITY.md.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you see, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: quotabot doctor output
      description: >
        Run `quotabot doctor` (or `quotabot doctor --json`) and paste the output.
        Redact any tokens, emails, or account names first.
      render: text
  - type: dropdown
    id: provider
    attributes:
      label: Provider involved
      options:
        - Not provider-specific
        - Codex
        - Claude
        - Grok
        - Antigravity
        - Kiro
        - Cursor
        - Windsurf
        - Ollama
        - LM Studio
        - Other / multiple
  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: e.g. Windows 11, macOS 15, Ubuntu 24.04
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: quotabot version or commit
      placeholder: e.g. v0.1.0 or a commit hash
