name: Feature request
description: Suggest an improvement or a new provider
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What are you trying to do that quotabot does not support today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? For a new provider, where does it store usage locally?
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Fit
      description: quotabot is local-first and reads only local metadata (no model calls).
      options:
        - label: This can be satisfied by reading local state, not by calling a model.
