# quotabot routing policy for the LiteLLM proxy.
#
# Copy to quotabot-routing.yaml (same folder as quotabot_router.py) or point the
# QUOTABOT_ROUTING env var at it. Every field has a safe default; unmanaged
# model names pass through unchanged, and managed logical models fail closed
# when no quota-plan or local route is available.

# Where the quotabot local HTTP server is listening.
# Start it with:  dart run bin/local_server.dart   (defaults to port 8721)
# Must be a loopback HTTP URL.
quotabot_url: "http://127.0.0.1:8721"

# How long a quota snapshot is reused before re-reading (seconds). This is a
# loopback metadata read, but caching avoids hitting the server on every request.
snapshot_ttl_seconds: 45

# Headroom percent below which a subscription is considered "low" and the next
# candidate (or a local fallback) is preferred.
comfort_threshold: 15

# Every managed remote route is atomically reserved before dispatch so parallel
# proxy requests see reduced effective headroom. The callback releases the lease;
# the TTL handles a request whose callback never runs. Values are clamped to
# 15..3600 seconds and 1..50 percent.
lease_seconds: 120
lease_weight_percent: 15

# No-surprise-billing default. Candidates marked `spend: paid_api` are skipped
# unless this is set to true. Mark a cloud candidate `spend: quota_plan` only
# when it is backed by a real included quota plan, and also set
# `overages_disabled: true` or `overages: disabled`; otherwise the route fails
# closed. API keys billed per request are `paid_api`, even if quotabot can read
# that provider's separate subscription quota.
allow_paid_api: false

# For managed logical models, fail closed instead of passing through to a
# possibly expensive original deployment when no safe candidate exists.
block_unsafe_passthrough: true

# Optional: append one JSON line per served request here, for usage reporting.
metrics_path: "~/.quotabot/litellm-metrics.jsonl"

# Logical models the plugin manages. A request whose model matches one of these
# is rerouted to the first candidate whose backing provider still has budget.
# `deployment` must match a model_name in your LiteLLM config.yaml below.
models:
  frontier-coder:
    candidates:
      - deployment: claude-sonnet   # API-key deployments are skipped by default
        provider: claude
        # account: work@example.com # Optional: match one quotabot account.
        spend: paid_api
      - deployment: codex-gpt
        provider: codex
        spend: paid_api
      - deployment: grok-code
        provider: grok
        spend: paid_api             # skipped unless allow_paid_api: true
      - deployment: ollama-qwen     # configured local fallback; backend checks reachability
        local: true

  cheap-bulk:
    candidates:
      - deployment: ollama-qwen     # do bulk work locally first
        local: true
      - deployment: claude-sonnet
        provider: claude
        spend: paid_api

# Steer specific agents to specific models. The agent identity is read only from
# trusted LiteLLM key alias or user_id; client-controlled request metadata cannot
# select these rules.
# `pin` forces a concrete deployment after spend-policy checks; `model`
# redirects to a logical model that is then routed by headroom.
agents:
  architect:
    pin: claude-sonnet      # use the strong model only when paid APIs are opted in
    pin_spend: paid_api     # skipped unless allow_paid_api: true
  bulk-summarizer:
    model: cheap-bulk       # prefer local, spill to Claude if needed
