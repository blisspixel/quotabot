# quotabot routing policy for the LiteLLM proxy.
#
# Copy to quotabot-routing.yaml (same folder as quotabot_router.py) or point the
# QUOTABOT_ROUTING env var at it. Every field has a safe default; the plugin
# falls through to the originally requested model whenever a rule does not match
# or quotabot is unreachable.

# Where the quotabot local HTTP server is listening.
# Start it with:  dart run bin/local_server.dart   (defaults to port 8721)
# Must be a loopback HTTP URL.
quotabot_url: "http://127.0.0.1:8721"

# How long a quota snapshot is reused before re-reading (seconds). Reads are
# local and free, but caching avoids hitting the server on every request.
snapshot_ttl_seconds: 45

# Headroom percent below which a subscription is considered "low" and the next
# candidate (or a local fallback) is preferred.
comfort_threshold: 15

# Optional: append one JSON line per served request here, for usage reporting.
metrics_path: "~/.quotabot/litellm-metrics.jsonl"

# Logical models the plugin manages. A request whose model matches one of these
# is rerouted to the first candidate whose backing provider still has budget.
# `deployment` must match a model_name in your LiteLLM config.yaml below.
models:
  frontier-coder:
    candidates:
      - deployment: claude-sonnet   # preferred while Claude has headroom
        provider: claude
      - deployment: codex-gpt
        provider: codex
      - deployment: grok-code
        provider: grok
      - deployment: ollama-qwen     # always-available local fallback
        local: true

  cheap-bulk:
    candidates:
      - deployment: ollama-qwen     # do bulk work locally first
        local: true
      - deployment: claude-sonnet
        provider: claude

# Steer specific agents to specific models. The agent identity is read from the
# LiteLLM key alias when present, then request metadata.agent or metadata.user.
# `pin` forces a concrete deployment; `model` redirects to a logical model that
# is then routed by headroom.
agents:
  architect:
    pin: claude-sonnet      # always use the strong model, never downgrade
  bulk-summarizer:
    model: cheap-bulk       # prefer local, spill to Claude if needed
