# Example LiteLLM proxy config wired to the quotabot router.
#
# Set LITELLM_MASTER_KEY to a strong local secret, then run with:
#   litellm --config config.yaml --host 127.0.0.1
#
# `model_list` declares the concrete deployments. The `model_name` values here
# are what quotabot-routing.yaml refers to as `deployment`. Clients call the
# logical names (e.g. "frontier-coder"); the quotabot hook rewrites the request
# to whichever concrete deployment currently has budget.
#
# The cloud entries below are normal API-key deployments and can create
# pay-as-you-go bills. The companion quotabot-routing.example.yaml marks them
# `spend: paid_api`, so the router skips them unless you explicitly set
# `allow_paid_api: true`. Mark a deployment `spend: quota_plan` only when it is
# backed by a real included quota plan, and set `overages_disabled: true` or
# `overages: disabled` in the routing policy.

model_list:
  - model_name: claude-sonnet
    litellm_params:
      model: anthropic/claude-sonnet-4-6
      api_key: os.environ/ANTHROPIC_API_KEY

  - model_name: codex-gpt
    litellm_params:
      model: openai/gpt-5.3-codex
      api_key: os.environ/OPENAI_API_KEY

  - model_name: grok-code
    litellm_params:
      model: xai/grok-code
      api_key: os.environ/XAI_API_KEY

  # Configured Ollama fallback. The router does not preflight this backend when
  # quotabot is unavailable, so keep the daemon reachable and do not use an
  # Ollama cloud-offloaded model for a route declared local.
  - model_name: ollama-qwen
    litellm_params:
      model: ollama/qwen3-coder
      api_base: http://127.0.0.1:11434

# Register the quotabot routing hook. The module must be importable, so launch
# the proxy from this folder (or add it to PYTHONPATH).
litellm_settings:
  callbacks: quotabot_router.proxy_handler_instance

# Require bearer authentication even on loopback. Loopback binding is the
# primary network boundary; this key is defense in depth against other local
# processes and browser-originated requests.
general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY
